seed: 42
dataset:
  basis: "sto-3g"
  molecules:
    - name: "h2"
      geometry:
        - ["H", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 0.74]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "lih"
      geometry:
        - ["Li", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.6]]
      charge: 0
      multiplicity: 1
      split: "train"
    - name: "beh2"
      geometry:
        - ["Be", [0.0, 0.0, 0.0]]
        - ["H", [0.0, 0.0, 1.3]]
        - ["H", [0.0, 0.0, -1.3]]
      charge: 0
      multiplicity: 1
      split: "val"
    - name: "n2"
      geometry:
        - ["N", [0.0, 0.0, 0.0]]
        - ["N", [0.0, 0.0, 1.1]]
      charge: 0
      multiplicity: 1
      split: "val"
training:
  synthetic_samples: 256
  epochs: 5
  batch_size: 8
  learning_rate: 0.0005
  max_seq_len: 64
model:
  vocab_size: 64
  hidden_size: 64
  num_layers: 1
  dropout: 0.0
baselines:
  max_iterations: 150
  optimizer: "SLSQP"
