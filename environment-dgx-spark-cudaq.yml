name: conditional-gqe-cudaq
channels:
  - conda-forge
  - nvidia
  - defaults
dependencies:
  - python=3.11
  - pip
  - pyyaml=6.0
  - numpy=2.*
  - scipy=1.14
  - matplotlib=3.9
  - tqdm=4.*
  - pip:
      - -r requirements.txt
      # NVIDIA CUDA-Q GQE baseline support (optional but included in this explicit stack)
      - cudaq-solvers[gqe]
